set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
# Change prefix to Ctrl+a
unbind C-b
set -g prefix C-a


# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Make new windows start after current
bind c new-window -a -c "#{pane_current_path}"
bind C new-window -c "#{pane_current_path}"

# Vim-style splits
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# Copy mode
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi V send-keys -X select-line
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi q send-keys -X cancel
bind-key -T copy-mode-vi Escape send-keys -X cancel

# Mouse + trackpad scrolling through tmux history.
set -g mouse on
bind -n WheelUpPane if-shell -F '#{mouse_any_flag}' 'send-keys -M' 'copy-mode -e; send-keys -M'
bind -n WheelDownPane if-shell -F '#{pane_in_mode}' 'send-keys -M' 'send-keys -M'

# Start from window index 1
set -g base-index 1
# Automatically renumber-windows
set -g renumber-windows on
# visuals
set -g status-position bottom
set -g status-justify left
set -g status-interval 2
set -g status-style 'bg=default'
set -g window-status-style "bg=default"
set -g status-bg default
set -g window-status-current-style "bg=default"
set -g status-left '#[fg=#1F1F28,bg=#957FB8,bold] #S #[default]'
set -g status-left-length 20
set -g status-right-length 300
set -g status-right '#(/bin/bash ~/.config/tmux/scripts/metrics.sh) #([ $(tmux show-option -qv key-table) = "off" ] && echo "[OFF]")'

set -g pane-border-lines single
set -g pane-border-style 'fg=#54546D'
set -g pane-active-border-style 'fg=#957FB8'
setw -g window-status-separator ''
setw -g window-status-current-format '  #I #W #F  '
setw -g window-status-format '  #I #W #F  '
setw -g window-status-current-style 'bg=#C8C093 fg=#1F1F28  bold'
setw -g window-status-style 'bg=default fg=#C8C093'

# F12 nested session toggle
bind -T root F12 \
  set prefix None \;\
  set key-table off \;\
  set status-style "fg=#C8C093,bg=#2D4F67" \;\
  if -F '#{pane_in_mode}' 'send-keys -X cancel' \;\
  refresh-client -S

bind -T off F12 \
  set -u prefix \;\
  set -u key-table \;\
  set -u status-style \;\
  refresh-client -S

# Allow passthrough
set -g allow-passthrough on
set -s set-clipboard on

setw -g mode-keys vi
